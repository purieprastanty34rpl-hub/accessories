
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pemesanan Aksesoris</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sky: {
              50: '#f0f9ff',
              100: '#e0f2fe',
              200: '#bae6fd',
              300: '#7dd3fc',
              400: '#38bdf8',
              500: '#0ea5e9',
            }
          }
        }
      }
    }
  </script>
  <style>
    body { background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%); min-height: 100vh; }
    .glass { background: rgba(255,255,255,0.85); backdrop-filter: blur(10px); }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #38bdf8; box-shadow: 0 0 0 3px rgba(56,189,248,0.2); }
    .btn-primary { background: linear-gradient(135deg, #38bdf8, #0ea5e9); transition: all 0.2s; }
    .btn-primary:hover { background: linear-gradient(135deg, #0ea5e9, #0284c7); transform: translateY(-1px); }
    .btn-danger { background: linear-gradient(135deg, #f87171, #ef4444); transition: all 0.2s; }
    .btn-danger:hover { background: linear-gradient(135deg, #ef4444, #dc2626); }
    table thead { background: linear-gradient(135deg, #38bdf8, #0ea5e9); }
    tr:hover td { background-color: #f0f9ff; }
    .toast { position: fixed; top: 20px; right: 20px; z-index: 9999; transition: all 0.3s; }
  </style>
</head>
<body class="font-sans p-4 md:p-8">

<!-- Header -->
<div class="max-w-7xl mx-auto">
  <div class="text-center mb-8">
    <h1 class="text-3xl md:text-4xl font-bold text-sky-700 drop-shadow">💎 Pemesanan Aksesoris</h1>
    <p class="text-sky-500 mt-1 text-sm">Sistem manajemen pesanan aksesoris online</p>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast hidden">
    <div id="toastMsg" class="px-5 py-3 rounded-xl shadow-lg text-white text-sm font-medium"></div>
  </div>

  <!-- Form Card -->
  <div class="glass rounded-2xl shadow-xl p-6 md:p-8 mb-8 border border-sky-100">
    <h2 class="text-xl font-semibold text-sky-700 mb-5 flex items-center gap-2">
      <span>📝</span> Form Input Pesanan
    </h2>
    <form id="orderForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">

      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-sky-700">Nama Customer <span class="text-red-400">*</span></label>
        <input type="text" id="namaCustomer" placeholder="Masukkan nama customer"
          class="border border-sky-200 rounded-lg px-3 py-2 text-sm bg-white" required />
      </div>

      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-sky-700">No HP <span class="text-red-400">*</span></label>
        <input type="text" id="noHp" placeholder="Contoh: 08123456789"
          class="border border-sky-200 rounded-lg px-3 py-2 text-sm bg-white" required />
      </div>

      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-sky-700">Jenis Produk <span class="text-red-400">*</span></label>
        <select id="jenisProduk" class="border border-sky-200 rounded-lg px-3 py-2 text-sm bg-white" required>
          <option value="">-- Pilih Jenis --</option>
          <option>Kalung</option>
          <option>Gelang</option>
          <option>Cincin</option>
          <option>Anting</option>
          <option>Bros</option>
          <option>Mahkota</option>
          <option>Lainnya</option>
        </select>
      </div>

      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-sky-700">Brand</label>
        <input type="text" id="brand" placeholder="Nama brand / merek"
          class="border border-sky-200 rounded-lg px-3 py-2 text-sm bg-white" />
      </div>

      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-sky-700">Bahan</label>
        <input type="text" id="bahan" placeholder="Contoh: Perak, Emas, Tembaga"
          class="border border-sky-200 rounded-lg px-3 py-2 text-sm bg-white" />
      </div>

      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-sky-700">Harga <span class="text-red-400">*</span></label>
        <input type="text" id="harga" placeholder="Contoh: 150000"
          class="border border-sky-200 rounded-lg px-3 py-2 text-sm bg-white" required />
        <span id="hargaPreview" class="text-xs text-sky-500 mt-0.5"></span>
      </div>

      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-sky-700">Tanggal Pesan <span class="text-red-400">*</span></label>
        <input type="date" id="tanggalPemesanan"
          class="border border-sky-200 rounded-lg px-3 py-2 text-sm bg-white" required />
      </div>

      <div class="flex flex-col gap-1 md:col-span-2">
        <label class="text-sm font-medium text-sky-700">Keterangan</label>
        <textarea id="keterangan" rows="2" placeholder="Catatan tambahan (opsional)"
          class="border border-sky-200 rounded-lg px-3 py-2 text-sm bg-white resize-none"></textarea>
      </div>

      <div class="md:col-span-2 lg:col-span-3 flex gap-3 pt-2">
        <button type="submit" id="submitBtn"
          class="btn-primary text-white px-6 py-2.5 rounded-xl font-semibold text-sm shadow">
          ➕ Simpan Pesanan
        </button>
        <button type="button" onclick="resetForm()"
          class="bg-sky-100 text-sky-700 px-5 py-2.5 rounded-xl font-semibold text-sm hover:bg-sky-200 transition">
          🔄 Reset
        </button>
      </div>
    </form>
  </div>

  <!-- Table Card -->
  <div class="glass rounded-2xl shadow-xl p-6 md:p-8 border border-sky-100">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-3 mb-5">
      <h2 class="text-xl font-semibold text-sky-700 flex items-center gap-2">
        <span>📋</span> Data Pesanan
        <span id="totalBadge" class="bg-sky-100 text-sky-600 text-xs font-bold px-2.5 py-1 rounded-full ml-1">0</span>
      </h2>
      <div class="flex gap-2">
        <input type="text" id="searchInput" placeholder="🔍 Cari nama / produk..."
          class="border border-sky-200 rounded-lg px-3 py-2 text-sm bg-white w-52" oninput="filterTable()" />
        <button onclick="loadData()"
          class="bg-sky-100 text-sky-700 px-4 py-2 rounded-lg text-sm font-medium hover:bg-sky-200 transition">
          🔃 Refresh
        </button>
      </div>
    </div>

    <div class="overflow-x-auto rounded-xl">
      <table class="w-full text-sm border-collapse min-w-[900px]">
        <thead>
          <tr class="text-white text-xs uppercase tracking-wide">
            <th class="px-3 py-3 text-left rounded-tl-xl">No</th>
            <th class="px-3 py-3 text-left">Nama Customer</th>
            <th class="px-3 py-3 text-left">No HP</th>
            <th class="px-3 py-3 text-left">Jenis</th>
            <th class="px-3 py-3 text-left">Nama Produk</th>
            <th class="px-3 py-3 text-left">Brand</th>
            <th class="px-3 py-3 text-left">Harga</th>
            <th class="px-3 py-3 text-left">Tgl Pesan</th>
            <th class="px-3 py-3 text-left">Keterangan</th>
            <th class="px-3 py-3 text-left">Timestamp</th>
            <th class="px-3 py-3 text-center rounded-tr-xl">Aksi</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr>
            <td colspan="11" class="text-center py-10 text-sky-400">
              <div class="flex flex-col items-center gap-2">
                <span class="text-3xl">📦</span>
                <span>Belum ada data. Klik Refresh atau tambah pesanan baru.</span>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
